name: Fetch All Bill Data Daily

on:
  schedule:
    # Chạy lúc 3h sáng mỗi ngày (giờ VN)
    - cron: '0 20 * * *'  # 20:00 UTC = 3:00 VN (UTC+7)
  
  # Cho phép chạy thủ công
  workflow_dispatch:

jobs:
  fetch-all-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # Bước 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3
      
      # Bước 2: Cài đặt jq (xử lý JSON)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      # Bước 3: Tạo thư mục data
      - name: Create data directory
        run: mkdir -p data
      
      # Bước 4: Lấy trang đầu tiên để biết tổng số trang
      - name: Fetch first page
        run: |
          echo "📥 Đang lấy trang 1..."
          curl -X 'GET' \
            'https://openapi.mobiwork.vn/OpenAPI/V1/Bill?trang_thai=%C4%90%C3%A3%20xu%E1%BA%A5t%20h%C3%A0ng&kieu_ngay=%20&page_size=1000&page_number=1' \
            -H 'accept: application/json' \
            -H 'Authorization: Basic ${{ secrets.API_KEY }}' \
            -o data/page_1.json
          
          # Đọc tổng số bản ghi
          TOTAL_RECORDS=$(jq -r '.total' data/page_1.json)
          echo "📊 Tổng số bản ghi: $TOTAL_RECORDS"
          
          # Tính tổng số trang
          TOTAL_PAGES=$(( ($TOTAL_RECORDS + 999) / 1000 ))
          echo "📑 Tổng số trang cần lấy: $TOTAL_PAGES"
          
          # Lưu thông tin
          echo "TOTAL_PAGES=$TOTAL_PAGES" >> $GITHUB_ENV
          echo "TOTAL_RECORDS=$TOTAL_RECORDS" >> $GITHUB_ENV
          
          # Lấy dữ liệu trang 1
          jq '.data' data/page_1.json > data/all_data.json
          
          echo "✅ Đã lấy trang 1/$(($TOTAL_PAGES))"
      
      # Bước 5: Lấy các trang còn lại
      - name: Fetch remaining pages
        run: |
          TOTAL_PAGES=${{ env.TOTAL_PAGES }}
          
          # Tạo file để lưu tiến độ
          echo "[]" > data/failed_pages.json
          
          for ((page=2; page<=TOTAL_PAGES; page++)); do
            echo "🔄 Đang lấy trang $page/$TOTAL_PAGES..."
            
            # Gọi API với delay 1 giây
            if curl -X 'GET' \
              "https://openapi.mobiwork.vn/OpenAPI/V1/Bill?trang_thai=%C4%90%C3%A3%20xu%E1%BA%A5t%20h%C3%A0ng&kieu_ngay=%20&page_size=1000&page_number=$page" \
              -H 'accept: application/json' \
              -H 'Authorization: Basic ${{ secrets.API_KEY }}' \
              -o "data/page_$page.json"; then
              
              # Kiểm tra dữ liệu
              PAGE_DATA=$(jq '.data' "data/page_$page.json")
              RECORD_COUNT=$(echo "$PAGE_DATA" | jq '. | length')
              
              if [ "$RECORD_COUNT" -gt 0 ]; then
                # Gộp dữ liệu
                jq -s 'add' data/all_data.json "data/page_$page.json" > data/temp.json
                mv data/temp.json data/all_data.json
                echo "  ✅ Trang $page: $RECORD_COUNT bản ghi"
              else
                echo "  ⚠️ Trang $page: Không có dữ liệu"
              fi
            else
              echo "  ❌ Lỗi trang $page"
              # Lưu trang bị lỗi
              echo "$page" >> data/failed_pages.json
            fi
            
            # Đợi 1 giây trước khi gọi trang tiếp
            echo "  ⏱️ Đợi 1 giây..."
            sleep 1
          done
          
          echo "✅ Hoàn thành!"
      
      # Bước 6: Tạo file dữ liệu cuối cùng và thống kê
      - name: Create final data and statistics
        run: |
          # Đếm số bản ghi đã lấy
          FINAL_COUNT=$(jq '. | length' data/all_data.json)
          
          # Kiểm tra số trang lỗi
          FAILED_COUNT=$(jq '. | length' data/failed_pages.json)
          
          # Tạo file bill_data.json chính thức
          cp data/all_data.json data/bill_data.json
          
          # Tạo metadata với thông tin chi tiết
          echo "{
            \"last_updated\": \"$(date -Iseconds)\",
            \"total_records_api\": ${{ env.TOTAL_RECORDS }},
            \"total_records_fetched\": $FINAL_COUNT,
            \"total_pages\": ${{ env.TOTAL_PAGES }},
            \"failed_pages\": $(cat data/failed_pages.json),
            \"failed_count\": $FAILED_COUNT,
            \"status\": \"success\",
            \"note\": \"Mỗi trang 1000 bản ghi\"
          }" > data/metadata.json
          
          # Hiển thị thông báo
          echo "📊 THỐNG KÊ CUỐI CÙNG:"
          echo "  - Tổng API: ${{ env.TOTAL_RECORDS }} bản ghi"
          echo "  - Đã lấy: $FINAL_COUNT bản ghi"
          echo "  - Số trang: ${{ env.TOTAL_PAGES }}"
          echo "  - Trang lỗi: $FAILED_COUNT"
          
          # Tính phần trăm hoàn thành
          PERCENT=$((FINAL_COUNT * 100 / ${{ env.TOTAL_RECORDS }} ))
          echo "  - Hoàn thành: $PERCENT%"
          
          # Nếu có trang lỗi, ghi log
          if [ $FAILED_COUNT -gt 0 ]; then
            echo "⚠️ Có $FAILED_COUNT trang bị lỗi, cần kiểm tra lại"
          fi
      
      # Bước 7: Dọn dẹp file tạm (giữ lại page_1.json để debug)
      - name: Clean up temp files
        run: |
          # Giữ lại page_1.json và xóa các file page khác để tiết kiệm dung lượng
          rm -f data/page_2.json data/page_*.json
          echo "✅ Đã dọn dẹp file tạm"
      
      # Bước 8: Commit và push
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add data/
          
          if git diff --staged --quiet; then
            echo "📝 Không có thay đổi dữ liệu"
          else
            # Đếm số bản ghi để đưa vào commit message
            RECORD_COUNT=$(jq '. | length' data/bill_data.json)
            git commit -m "📊 Cập nhật dữ liệu bill $(date +'%Y-%m-%d') - $RECORD_COUNT bản ghi"
            git push
            echo "✅ Đã đẩy dữ liệu mới lên repository"
          fi